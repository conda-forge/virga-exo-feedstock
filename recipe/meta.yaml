{% set name = "virga-exo" %}
{% set version = "2.0.2" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 0e2685d58011d9a5b9b5177a71e5ab945eee082f8cd81839a6c4f950524c6a42

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - pandas
    - bokeh
    - astropy-base
    - scipy <1.14
    - miepython
    - matplotlib-base

test:
  imports:
    - virga
    - virga.justdoit
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://natashabatalha.github.io/virga
  summary: substellar atmosphere code for computing clouds
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Nicholaswogan
    - natashabatalha
